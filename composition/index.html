<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revid - Logo Reveal</title>
  
  <!-- Premium Typography Fonts (Space Grotesk + Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: dark;
      background: #06070a;
      font-family: 'Inter', sans-serif;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06070a;
    }

    /* 1920x1080 Exact Video Frame Stage */
    #stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #06070a;
    }

    /* Track-based Clip Layers (Hyperframes convention) */
    .clip {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      pointer-events: none;
      overflow: hidden;
    }

    /* Scene 1 Elements (Logo Mark & Background) */
    #ambient-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #06070a;
    }

    /* Organic Floating Orbs */
    .glow {
      position: absolute;
      border-radius: 999px;
      filter: blur(140px);
      opacity: 0.16;
      will-change: transform, opacity;
    }
    .glow-1 {
      width: 650px;
      height: 650px;
      background: radial-gradient(circle, #80F3B2 0%, transparent 70%);
      left: -120px;
      top: -120px;
    }
    .glow-2 {
      width: 750px;
      height: 750px;
      background: radial-gradient(circle, #2b3a8a 0%, transparent 70%);
      right: -100px;
      bottom: -100px;
    }
    .glow-3 {
      width: 550px;
      height: 550px;
      background: radial-gradient(circle, #80F3B2 0%, transparent 72%);
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      opacity: 0.11;
    }

    /* Micro-grid Texture Layer */
    .grid-texture {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image:
        linear-gradient(90deg, #ffffff 1px, transparent 1px),
        linear-gradient(180deg, #ffffff 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 0%, transparent 80%);
    }

    /* Logo Frame Layout (Centered at 960, 540 initially) */
    #logo-container {
      position: absolute;
      width: 400px;
      height: 400px;
      left: 780px; /* 960 - 200 */
      top: 340px;  /* 540 - 200 */
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      will-change: transform, opacity;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    /* SVG Elements Styling */
    .logo-svg {
      width: 380px;
      height: 380px;
      overflow: visible;
    }

    /* Brackets (Mint Green) */
    .bracket {
      stroke: #80F3B2;
      stroke-width: 11px;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      will-change: transform, stroke-dashoffset;
    }

    /* Outer Iris Ring (Polished Off-White) */
    .eye-ring {
      stroke: #ffffff;
      stroke-width: 11px;
      stroke-linecap: round;
      fill: none;
      will-change: transform, stroke-dashoffset;
    }

    /* Inner Pupil Crescent (Filled Off-White) */
    .eye-pupil {
      fill: #ffffff;
      will-change: transform, opacity;
    }

    /* Stage Light Sweep Flare Overlay */
    .light-sweep {
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, 
        transparent 35%, 
        rgba(255, 255, 255, 0) 42%, 
        rgba(255, 255, 255, 0.45) 50%, 
        rgba(255, 255, 255, 0) 58%, 
        transparent 65%
      );
      background-size: 220% 100%;
      background-position-x: 160%;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 50;
    }

    /* Scene 2 Elements (Wordmark) */
    .wordmark-container {
      position: absolute;
      width: 600px;
      height: 120px;
      left: 680px; /* 960 - 300 */
      top: 590px;  /* Target y-coordinate (placed comfortably below the shifted logo mark) */
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .wordmark-inner {
      display: flex;
      height: 120px;
      align-items: center;
      overflow: hidden;
    }

    .letter {
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 88px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
      text-transform: capitalize;
      letter-spacing: -0.01em;
      will-change: transform, opacity;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    /* Scene 3 Elements (Tagline) */
    .tagline-container {
      position: absolute;
      width: 600px;
      height: 40px;
      left: 680px; /* 960 - 300 */
      top: 705px;  /* Placed cleanly below wordmark */
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: #80F3B2; /* Brand Mint Green */
      letter-spacing: 0.45em;
      text-indent: 0.45em; /* Ensure true alignment with tracking */
      text-transform: uppercase;
      will-change: transform, opacity;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }
  </style>
</head>
<body>
  
  <!-- Main Composition Wrapper -->
  <div
    id="stage"
    data-composition-id="Main"
    data-start="0"
    data-duration="3"
    data-width="1920"
    data-height="1080"
    data-motionabl-fps="30"
    data-motionabl-scenes='[
      {"label": "Mark Build", "from": 0, "durationInFrames": 30},
      {"label": "Wordmark", "from": 30, "durationInFrames": 30},
      {"label": "Brand Hold", "from": 60, "durationInFrames": 30}
    ]'
  >
    
    <!-- Cinematic Scoring (Declarative Media Elements) -->
    <!-- Track 1: Ambient High-Tech Music Loop -->
    <audio 
      src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/music/1780400772306_p6mr1cbwh9a_music_Sleek_high_tech_logo.mp3" 
      preload="auto" 
      data-start="0" 
      data-duration="3" 
      data-track-index="1" 
      data-volume="0.8"
    ></audio>

    <!-- Track 2: Camera Eye Mechanical Activation / Lock-in SFX (Starts 0.1s to anticipation-build) -->
    <audio 
      src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/sfx/1780400782406_8466ttguuqb_sfx_futuristic_tech_camera_focus__.mp3" 
      preload="auto" 
      data-start="0.1" 
      data-duration="2.0" 
      data-track-index="2" 
      data-volume="0.85"
    ></audio>

    <!-- Track 3: Digital Wind Sweep SFX (Starts 0.9s to anticipate the wordmark reveal) -->
    <audio 
      src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/sfx/1780400791700_7rdgfq85f86_sfx_futuristic_electronic_sweep_wh.mp3" 
      preload="auto" 
      data-start="0.9" 
      data-duration="1.8" 
      data-track-index="3" 
      data-volume="0.75"
    ></audio>

    <!-- TRACK INDEX 0: BACKGROUND & LENS/MARK BUILDING LAYER (0s - 3s) -->
    <div
      id="mark-clip"
      class="clip"
      data-start="0"
      data-duration="3"
      data-track-index="0"
    >
      <!-- Background and Glows -->
      <div id="ambient-bg">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
        <div class="grid-texture"></div>
      </div>

      <!-- Linear Lens Flare Sweep Overlay -->
      <div class="light-sweep"></div>

      <!-- Center Eye Vector Mark Logo Container -->
      <div id="logo-container">
        <svg class="logo-svg" viewBox="0 0 400 400">
          <defs>
            <!-- Mask to slice the pupil into a beautiful camera eye crescent moon + light cutout -->
            <mask id="pupil-crescent-mask">
              <!-- Solid White: Everything is drawn -->
              <rect x="0" y="0" width="400" height="400" fill="#ffffff" />
              <!-- Black Circle Offset: Subtract to form the crescent moon shadow -->
              <circle cx="178" cy="178" r="30" fill="#000000" />
              <!-- Black Circle: Small highlight cutout on the top-left of the crescent -->
              <circle cx="188" cy="188" r="7" fill="#000000" />
            </mask>
          </defs>

          <!-- 1. The Outer Viewfinder Brackets (4 Pieces) -->
          <!-- Top-Left Bracket -->
          <path id="bracket-tl" class="bracket" pathLength="1" d="M 136,86 H 122 A 32,32 0 0,0 86,122 V 136" />
          <!-- Top-Right Bracket -->
          <path id="bracket-tr" class="bracket" pathLength="1" d="M 264,86 H 278 A 32,32 0 0,1 314,122 V 136" />
          <!-- Bottom-Right Bracket -->
          <path id="bracket-br" class="bracket" pathLength="1" d="M 314,264 V 278 A 32,32 0 0,1 278,314 H 264" />
          <!-- Bottom-Left Bracket -->
          <path id="bracket-bl" class="bracket" pathLength="1" d="M 86,264 V 278 A 32,32 0 0,0 122,314 H 136" />

          <!-- 2. The Lens Circle / Iris (Draws in center) -->
          <circle id="eye-ring" class="eye-ring" cx="200" cy="200" r="54" pathLength="1" />

          <!-- 3. The Inner Pupil Crescent (Masked solid shape) -->
          <!-- Center shifted slightly to (204, 200) for balanced visual weight with the crescent shadow -->
          <circle id="eye-pupil" class="eye-pupil" cx="204" cy="200" r="30" mask="url(#pupil-crescent-mask)" />
        </svg>
      </div>
    </div>

    <!-- TRACK INDEX 1: WORDMARK REVEAL LAYER (1.0s - 3.0s) -->
    <div
      id="wordmark-clip"
      class="clip"
      data-start="1.0"
      data-duration="2.0"
      data-track-index="4"
    >
      <div class="wordmark-container">
        <div class="wordmark-inner" data-layout-allow-overflow="true">
          <span class="letter">R</span>
          <span class="letter">e</span>
          <span class="letter">v</span>
          <span class="letter">i</span>
          <span class="letter">d</span>
        </div>
      </div>
    </div>

    <!-- TRACK INDEX 2: TAGLINE HOLD LAYER (2.0s - 3.0s) -->
    <div
      id="tagline-clip"
      class="clip"
      data-start="2.0"
      data-duration="1.0"
      data-track-index="5"
    >
      <div class="tagline-container">
        <span class="tagline">AI Video Platform</span>
      </div>
    </div>

  </div>

  <!-- GSAP Animation Core Engine -->
  <script src="./vendor/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};

    // 1. Create fully deterministic, paused timeline
    const timeline = gsap.timeline({ paused: true });

    // -------------------------------------------------------------
    // SCENE 1: MARK BUILD (0.0s - 1.0s)
    // -------------------------------------------------------------

    // Initialize stroke-dash offsets for line draws (pathLength="1" setup)
    gsap.set(".bracket, .eye-ring", { strokeDasharray: 1, strokeDashoffset: 1 });

    // A. Corner Brackets "Piece Assemble" + "Stroke Draw" Animation
    // Brackets draw in extremely fast and snap-settle
    timeline.from("#bracket-tl", { x: -85, y: -85, scale: 0.65, opacity: 0, duration: 0.45, ease: "back.out(1.5)" }, 0.0);
    timeline.from("#bracket-tr", { x: 85, y: -85, scale: 0.65, opacity: 0, duration: 0.45, ease: "back.out(1.5)" }, 0.03);
    timeline.from("#bracket-br", { x: 85, y: 85, scale: 0.65, opacity: 0, duration: 0.45, ease: "back.out(1.5)" }, 0.06);
    timeline.from("#bracket-bl", { x: -85, y: 85, scale: 0.65, opacity: 0, duration: 0.45, ease: "back.out(1.5)" }, 0.09);

    timeline.to(".bracket", { strokeDashoffset: 0, duration: 0.5, ease: "power3.out" }, 0.0);

    // B. Camera Iris / Circle Lens Draw-in
    // Ring draws in swiftly with an energetic rebound at 0.25s
    timeline.to("#eye-ring", { strokeDashoffset: 0, duration: 0.5, ease: "power2.out" }, 0.25);
    timeline.from("#eye-ring", { scale: 0.45, transformOrigin: "200px 200px", duration: 0.6, ease: "elastic.out(1, 0.6)" }, 0.25);

    // C. Center Crescent Pupil Scale Up
    timeline.from("#eye-pupil", { scale: 0, transformOrigin: "200px 200px", duration: 0.4, ease: "back.out(1.5)" }, 0.45);

    // D. Ambient Background Life (Slow drifting orbs, scaled for shorter timeline)
    timeline.fromTo(".glow-1", { x: -30, y: -20 }, { x: 40, y: 30, duration: 1.5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 0.0);
    timeline.fromTo(".glow-2", { x: 30, y: 20 }, { x: -40, y: -30, duration: 1.5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 0.0);
    timeline.fromTo(".glow-3", { scale: 0.95 }, { scale: 1.15, opacity: 0.16, duration: 1.5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 0.0);

    // -------------------------------------------------------------
    // SCENE 2: WORDMARK REVEAL (1.0s - 2.0s)
    // -------------------------------------------------------------

    // A. Eye Logo Lockup Shift Upwards (Re-balancing the screen space swiftly)
    timeline.to("#logo-container", {
      y: -116,
      scale: 0.86,
      duration: 0.5,
      ease: "power3.inOut"
    }, 1.0);

    // B. Wordmark Mask Reveal (Individual letters sliding up from mask, crisp stagger)
    timeline.from(".letter", {
      yPercent: 105,
      opacity: 0,
      duration: 0.45,
      stagger: 0.03,
      ease: "power4.out"
    }, 1.1);

    // C. Wordmark Kerning Settle (Animating spacing wide -> tight)
    timeline.from(".wordmark-inner", {
      letterSpacing: "0.22em",
      duration: 0.6,
      ease: "power3.out"
    }, 1.1);

    // -------------------------------------------------------------
    // SCENE 3: HOLD & GLOSS (2.0s - 3.0s)
    // -------------------------------------------------------------

    // A. Subtext Tagline Reveal
    timeline.from(".tagline", {
      yPercent: 105,
      opacity: 0,
      letterSpacing: "0.58em",
      duration: 0.45,
      ease: "power3.out"
    }, 2.0);

    // B. Light Sweep Gloss Pass (A diagonal glossy shine reflecting off the logo)
    timeline.to(".light-sweep", {
      backgroundPositionX: "-60%",
      duration: 0.6,
      ease: "power2.inOut"
    }, 2.1);

    // Make the timeline accessible to the Hyperframes host
    window.__timelines.Main = timeline;
  </script>
</body>
</html>
